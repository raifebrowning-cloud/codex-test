<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spore Ant Maze FPS</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <div class="title">Spore Ant Maze FPS</div>
      <div class="stats">
        <span id="health">Health: 100</span>
        <span id="ammo">Spore Blaster: ∞</span>
        <span id="kills">Ants Defeated: 0</span>
      </div>
      <div id="message">Click to enter the maze. WASD to move, mouse to aim, click to fire.</div>
      <div id="crosshair">+</div>
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
