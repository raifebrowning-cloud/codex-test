<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squirrel Parkour Courses</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="hud">
      <div class="title">Squirrel Parkour</div>
      <div class="stats">
        <span id="course">Course: Maple Sprint</span>
        <span id="acorns">Acorns: 0 / 18</span>
        <span id="timer">Time: 0.0s</span>
      </div>
      <div id="message">
        Click to play. WASD move, Space jump, Shift dash. Beat all 3 parkour courses!
      </div>
      <div id="crosshair">●</div>
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
